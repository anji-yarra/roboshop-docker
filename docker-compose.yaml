name: docker-roboshop
services:
  mongodb:
    build: ./mongodb
    image: mongodb:v1
    container_name: mongodb
  catalogue:
    build: ./catalogue
    image: catalogue:v1
    container_name: catalogue
    depends_on:
      - mongodb
  frontend:
    build: ./frontend
    image: frontend:v1
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - catalogue
      - user
      - cart
      # - shipping
      # - payment
  user:
    build: ./user
    image: user:v1
    container_name: user
    environment:
      - MONGO_URL=mongodb://mongodb:27017/user
      - MONGO=true
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb
      - redis
  cart:
    build: ./cart
    image: cart:v1
    container_name: cart
    environment:
      REDIS_HOST: redis
      CATALOGUE_HOST: catalogue
      CATALOGUE_PORT: 8080
    depends_on:
      - redis
      - catalogue
  shipping:
    build: ./shipping
    image: shipping:v1
    container_name: shipping
    environment:
      - CART_ENDPOINT: cart:8080
      - DB_HOST: mysql
    depends_on:
      - mysql
      - cart
  # payment:
  #   build: ./payment
  #   image: payment:v1
  #   container_name: payment
  #   environment:
  #     - CART_HOST: cart
  #     - CART_PORT: 8080
  #     - USER_HOST: user
  #     - USER_PORT: 8080
  #     - AMQP_HOST: rabbitmq
  #     - AMQP_USRER: roboshop
  #     - AMQP_PASSWORD: roboshop123
  #   depends_on:
  #     - cart
  #     - user
  #     - rabbitmq
  redis:
    image: redis:7.0
    container_name: redis
  mysql:
    image: mysql:v1
    build: ./mysql
    container_name: mysql
    command: --mysql-native-password=ON --innodb-lock_wait_timeout=120
    environment:
      MYSQL_ROOT_PASSWORD: "RoboShop@1"
  # rabbitmq:
  #   image: rabbitmq:3
  #   container_name: rabbitmq
  #   environment:
  #     - RABBITMQ_DEFAULT_USER=roboshop
  #     - RABBITMQ_DEFAULT_PASS=roboshop123
networks:
  default:
    name: roboshop
    driver: bridge
    external: false